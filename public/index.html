<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f6f7fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>NOTE BUZZ ENGINE v3.3.1</title>
<style>
/* ===== BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'SF Pro Text', 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #f6f7fb;
  color: #2a2a3e;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
}

/* ===== LAYOUT ===== */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: 56px 1fr 36px;
  height: 100vh;
}

/* ===== TOPBAR ===== */
.topbar {
  grid-column: 1 / -1;
  background: #ffffff;
  border-bottom: 1px solid #e5e7ee;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.logo {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 3px;
  color: #222;
  white-space: nowrap;
}
.logo em { color: #ff4466; font-style: normal; }
.v-tag {
  font-size: 9px;
  color: #9097b0;
  letter-spacing: 2px;
  padding: 3px 7px;
  border: 1px solid #e2e4ee;
  border-radius: 4px;
  background: #fafbfd;
}

/* Account tabs */
.acc-tabs {
  display: flex;
  gap: 4px;
  margin-left: 8px;
}
.acc-tab {
  background: #f1f2f7;
  border: 1px solid #e4e6ee;
  color: #6a7090;
  padding: 7px 14px;
  font-size: 10px;
  letter-spacing: 1.5px;
  cursor: pointer;
  font-family: inherit;
  border-radius: 6px;
  transition: all .15s;
  font-weight: 600;
  white-space: nowrap;
}
.acc-tab:hover { border-color: #cdd1e0; color: #3b3e55; }
.acc-tab.active-ai {
  background: #eef2ff;
  border-color: #4f6af5;
  color: #2949d8;
}
.acc-tab.active-store {
  background: #ecfdf3;
  border-color: #1ec070;
  color: #0d8c4c;
}
.acc-tab.active-affi {
  background: #fff1ec;
  border-color: #ff6a3d;
  color: #d44a18;
}

.acc-info {
  font-size: 10px;
  color: #6a7090;
  letter-spacing: 0.5px;
  padding: 5px 10px;
  border-left: 2px solid #e4e6ee;
}
.acc-info b { color: #2a2a3e; font-weight: 700; }

/* Plan toggle */
.plan-toggle {
  display: flex;
  border: 1px solid #e4e6ee;
  border-radius: 6px;
  overflow: hidden;
  margin-left: auto;
}
.plan-btn {
  background: #fafbfd;
  border: none;
  color: #9097b0;
  padding: 6px 14px;
  font-size: 10px;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
  transition: all .15s;
}
.plan-btn.active-free { background: #eef2ff; color: #2949d8; }
.plan-btn.active-paid { background: #fff5e0; color: #b57700; }

/* Level badge */
.level-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 5px 12px;
  border: 1px solid #e4e6ee;
  background: #fafbfd;
  border-radius: 6px;
  white-space: nowrap;
}
.lv1 { color: #2949d8; border-color: #c9d3ff; background: #eef2ff; }
.lv2 { color: #0d8c4c; border-color: #b8ead0; background: #ecfdf3; }
.lv3 { color: #b57700; border-color: #fbe1a0; background: #fff5e0; }
.lv4 { color: #d44a18; border-color: #fac7b5; background: #fff1ec; }
.lv5 { color: #c4104b; border-color: #f7b3c8; background: #fff0f5; }

/* Day counter */
.day-counter {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: #6a7090;
  letter-spacing: 1px;
  background: #fafbfd;
  border: 1px solid #e4e6ee;
  border-radius: 6px;
  padding: 3px 6px;
}
.day-counter input {
  width: 40px;
  background: transparent;
  border: none;
  color: #2a2a3e;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  font-family: inherit;
  outline: none;
}

/* Quote indicator */
.quote-ind {
  font-size: 10px;
  letter-spacing: 1px;
  padding: 5px 10px;
  background: #fff5e0;
  border: 1px solid #fbe1a0;
  color: #b57700;
  border-radius: 6px;
  transition: all .2s;
}
.quote-ind.ready {
  background: #ecfdf3;
  border-color: #6fd9a3;
  color: #0d8c4c;
  animation: blink .8s ease-in-out infinite;
}
.quote-ind.disabled { opacity: 0.4; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

.trend-ind {
  font-size: 10px;
  letter-spacing: 1px;
  padding: 5px 10px;
  background: #f0ecff;
  border: 1px solid #d4c8ff;
  color: #5e3ad8;
  border-radius: 6px;
  cursor: pointer;
  user-select: none;
  transition: all .15s;
  font-weight: 600;
}
.trend-ind.active { background: #5e3ad8; color: white; border-color: #5e3ad8; }
.trend-ind.disabled { opacity: 0.4; cursor: not-allowed; }

.yr-tag {
  font-size: 10px;
  letter-spacing: 2px;
  padding: 5px 10px;
  background: #ecfdf3;
  border: 1px solid #b8ead0;
  color: #0d8c4c;
  border-radius: 6px;
  font-weight: 700;
}

.cost-tag {
  font-size: 10px;
  letter-spacing: 1px;
  padding: 5px 10px;
  background: #fff1ec;
  border: 1px solid #ffcd9c;
  color: #d44a18;
  border-radius: 6px;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
}
.cost-tag:hover { background: #ff6a3d; color: white; border-color: #ff6a3d; }

.hero-image {
  width: 100%;
  max-width: 600px;
  border-radius: 12px;
  margin-bottom: 16px;
  display: block;
  border: 1px solid #e5e7ee;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.image-actions {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}

.dup-warning {
  background: #fff5e0;
  border: 1px solid #fbe1a0;
  border-left: 4px solid #e8a020;
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 11px;
  color: #8a4420;
  margin-bottom: 14px;
  line-height: 1.6;
}
.dup-warning b { color: #b57700; }

.cost-modal {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.cost-modal.show { display: flex; }
.cost-modal-body {
  background: white;
  padding: 24px;
  border-radius: 12px;
  min-width: 380px;
  max-width: 480px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.2);
}
.cost-modal h3 { font-size: 13px; letter-spacing: 2px; margin-bottom: 16px; color: #2a2a3e; }
.cost-modal table { width: 100%; font-size: 11px; }
.cost-modal td { padding: 6px 4px; border-bottom: 1px solid #f0f1f5; }
.cost-modal td.r { text-align: right; color: #d44a18; font-weight: 700; }
.cost-modal .big { font-size: 24px; color: #ff4466; font-weight: 800; margin: 10px 0; }

.feat-badge {
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 8px;
  font-weight: 700;
  letter-spacing: 1px;
}
.feat-on { background: #ecfdf3; color: #0d8c4c; }
.feat-off { background: #ffecec; color: #c4104b; }

/* ===== SIDEBAR ===== */
.sidebar {
  background: #ffffff;
  border-right: 1px solid #e5e7ee;
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.sec-label {
  font-size: 9px;
  letter-spacing: 2.5px;
  color: #9097b0;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 6px;
}

/* Buttons */
.btn-row { display: flex; flex-direction: column; gap: 4px; }
.btn-sm {
  background: #fafbfd;
  border: 1px solid #e4e6ee;
  color: #4a4e68;
  padding: 7px 10px;
  font-size: 11px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  border-radius: 6px;
  transition: all .12s;
  width: 100%;
}
.btn-sm:hover { border-color: #b8bed0; background: #f3f4f9; }
.btn-sm.active { background: #fff1ec; border-color: #ff6a3d; color: #d44a18; font-weight: 700; }

/* Type grid */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.type-btn {
  background: #fafbfd;
  border: 1px solid #e4e6ee;
  color: #4a4e68;
  padding: 8px 6px;
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
  border-radius: 6px;
  transition: all .12s;
  line-height: 1.4;
  text-align: center;
}
.type-btn:hover { border-color: #b8bed0; background: #f3f4f9; }
.type-btn.active { background: #ecfdf3; border-color: #1ec070; color: #0d8c4c; font-weight: 700; }
.type-btn .sub {
  font-size: 8px;
  color: #9097b0;
  display: block;
  margin-top: 3px;
  font-weight: 500;
}
.type-btn.active .sub { color: #22a263; }

/* Persona grid */
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.pbtn {
  background: #fafbfd;
  border: 1px solid #e4e6ee;
  color: #4a4e68;
  padding: 6px 6px;
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
  border-radius: 6px;
  transition: all .12s;
  text-align: center;
}
.pbtn:hover { border-color: #b8bed0; }
.pbtn.active { background: #eef2ff; border-color: #4f6af5; color: #2949d8; font-weight: 700; }

/* Inputs */
input.kw-input, select.aff-select {
  width: 100%;
  background: #fafbfd;
  border: 1px solid #e4e6ee;
  color: #2a2a3e;
  padding: 8px 10px;
  font-size: 12px;
  font-family: inherit;
  border-radius: 6px;
  outline: none;
  transition: border .12s;
}
input.kw-input:focus, select.aff-select:focus { border-color: #4f6af5; background: white; }
select.aff-select {
  cursor: pointer;
  font-size: 11px;
}

/* Generate button */
.gen-btn {
  width: 100%;
  background: linear-gradient(135deg, #ff4466, #ff6a3d);
  border: none;
  color: white;
  padding: 12px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 3px;
  cursor: pointer;
  font-family: inherit;
  border-radius: 8px;
  transition: all .15s;
  margin-top: auto;
  box-shadow: 0 4px 14px rgba(255, 68, 102, 0.25);
}
.gen-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255, 68, 102, 0.35); }
.gen-btn:disabled { background: #d4d7e0; color: #9097b0; cursor: not-allowed; box-shadow: none; transform: none; }
.gen-btn.loading { animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .6; } }

/* History */
.hist-pill {
  display: inline-block;
  background: #f3f4f9;
  border: 1px solid #e4e6ee;
  color: #6a7090;
  padding: 3px 8px;
  font-size: 9px;
  margin: 2px;
  border-radius: 10px;
}

/* Toggle options */
.toggle-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.toggle-chip {
  background: #fafbfd;
  border: 1px solid #e4e6ee;
  color: #6a7090;
  padding: 5px 10px;
  font-size: 10px;
  cursor: pointer;
  border-radius: 14px;
  font-family: inherit;
  transition: all .12s;
  font-weight: 600;
}
.toggle-chip.on {
  background: #f0ecff;
  border-color: #5e3ad8;
  color: #5e3ad8;
}

/* Meta banner */
.meta-banner {
  background: linear-gradient(135deg, #fff8e6, #fff1ec);
  border: 1px solid #ffcd9c;
  border-left: 4px solid #ff6a3d;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 10px;
  color: #8a4420;
  line-height: 1.6;
  display: none;
}
.meta-banner.show { display: block; }
.meta-banner b { color: #d44a18; }

/* ===== MAIN ===== */
.main {
  background: #f6f7fb;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.tabs {
  display: flex;
  border-bottom: 1px solid #e5e7ee;
  background: #ffffff;
  padding: 0 4px;
}
.tab {
  padding: 12px 18px;
  font-size: 10px;
  letter-spacing: 2px;
  font-weight: 700;
  cursor: pointer;
  color: #9097b0;
  border: none;
  background: none;
  font-family: inherit;
  border-bottom: 2px solid transparent;
  transition: all .12s;
}
.tab:hover { color: #4a4e68; }
.tab.active { color: #2a2a3e; border-bottom-color: #ff4466; }
.tab .badge {
  display: inline-block;
  margin-left: 4px;
  padding: 1px 6px;
  background: #ff4466;
  color: white;
  border-radius: 8px;
  font-size: 8px;
  vertical-align: middle;
}

.preview {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  scrollbar-width: thin;
  scrollbar-color: #d4d7e0 transparent;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 14px;
}
.empty-big {
  font-size: 40px;
  letter-spacing: 14px;
  color: #d4d7e0;
  font-weight: 800;
}
.empty-sub { font-size: 10px; letter-spacing: 3px; color: #b4b8c8; }

/* Quote card */
.quote-card {
  background: linear-gradient(135deg, #fff8e6, #fffdf3);
  border: 1px solid #fbe1a0;
  border-left: 4px solid #e8a020;
  padding: 12px 16px;
  margin-bottom: 16px;
  border-radius: 6px;
}
.quote-who { font-size: 9px; color: #8a6300; letter-spacing: 2px; margin-bottom: 6px; font-weight: 700; }
.quote-text { font-size: 12px; color: #6a4a00; line-height: 1.7; font-style: italic; }
.quote-src { font-size: 9px; color: #9c8045; margin-top: 6px; }
.quote-verify {
  display: inline-block;
  background: #ffdf85;
  color: #8a4420;
  font-size: 8px;
  padding: 1px 6px;
  margin-left: 6px;
  letter-spacing: 1px;
  border-radius: 4px;
  font-weight: 700;
}

/* Trend card */
.trend-card {
  background: linear-gradient(135deg, #f6f2ff, #fff5f5);
  border: 1px solid #d4c8ff;
  border-left: 4px solid #5e3ad8;
  padding: 12px 16px;
  margin-bottom: 16px;
  border-radius: 6px;
}
.trend-head { font-size: 9px; color: #5e3ad8; letter-spacing: 2px; font-weight: 800; margin-bottom: 6px; }
.trend-body { font-size: 11px; color: #4a3a7e; line-height: 1.7; white-space: pre-wrap; }

/* Review banner */
.review-banner {
  background: #fff5e0;
  border: 1px solid #fbe1a0;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 10px;
  color: #8a4420;
  margin-bottom: 12px;
  font-weight: 600;
}

/* Article preview */
.art-title {
  font-size: 17px;
  font-weight: 800;
  color: #1a1a2e;
  line-height: 1.5;
  border-left: 4px solid #ff4466;
  padding: 4px 14px;
  margin-bottom: 14px;
  flex: 1;
}
.art-meta {
  font-size: 10px;
  color: #9097b0;
  margin-bottom: 18px;
  letter-spacing: 1px;
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}
.plan-tag {
  font-size: 9px;
  padding: 3px 9px;
  letter-spacing: 1px;
  border-radius: 10px;
  font-weight: 700;
}
.plan-tag.free { background: #eef2ff; color: #2949d8; }
.plan-tag.paid { background: #fff5e0; color: #b57700; }
.series-tag {
  font-size: 9px;
  padding: 3px 9px;
  background: #f0ecff;
  color: #5e3ad8;
  border-radius: 10px;
  font-weight: 700;
  letter-spacing: 1px;
}

.art-body p { color: #3a3e55; font-size: 12px; margin-bottom: 10px; line-height: 1.95; }
.art-h2 { font-size: 13px; font-weight: 800; color: #1a1a2e; margin: 20px 0 8px; padding-bottom: 5px; border-bottom: 1px solid #e5e7ee; }
.art-step { background: #ecfdf3; border-left: 4px solid #1ec070; padding: 8px 12px; margin: 8px 0; font-size: 12px; color: #0a6a38; line-height: 1.7; border-radius: 4px; }
.art-li { padding: 3px 0 3px 12px; border-left: 2px solid #d4d7e0; color: #3a3e55; font-size: 12px; margin-bottom: 5px; }
.art-pro-tip {
  background: linear-gradient(135deg, #fff8e6, #fffdf3);
  border: 1px solid #fbe1a0;
  padding: 10px 14px;
  margin: 12px 0;
  font-size: 12px;
  color: #8a6300;
  line-height: 1.7;
  border-radius: 6px;
}
.art-pro-tip::before {
  content: '▶ PRO TIP';
  font-size: 9px;
  color: #b57700;
  letter-spacing: 2px;
  display: block;
  margin-bottom: 5px;
  font-weight: 800;
}
.art-meta-note {
  background: #eef2ff;
  border-left: 4px solid #4f6af5;
  padding: 10px 14px;
  margin: 12px 0;
  font-size: 11px;
  color: #2949d8;
  line-height: 1.7;
  border-radius: 6px;
}
.art-meta-note::before {
  content: '📮 MESSAGE';
  font-size: 9px;
  color: #4f6af5;
  letter-spacing: 2px;
  display: block;
  margin-bottom: 4px;
  font-weight: 800;
}

/* X posts */
.x-post {
  background: #ffffff;
  border: 1px solid #e5e7ee;
  padding: 12px 14px;
  margin-bottom: 8px;
  border-radius: 8px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.x-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.x-num { font-size: 9px; color: #9097b0; letter-spacing: 2px; font-weight: 700; }
.x-chars { font-size: 9px; font-weight: 700; }
.x-text { font-size: 12px; color: #3a3e55; line-height: 1.75; white-space: pre-wrap; }
.x-role {
  display: inline-block;
  font-size: 8px;
  padding: 1px 6px;
  background: #f3f4f9;
  color: #6a7090;
  border-radius: 8px;
  margin-left: 4px;
  font-weight: 600;
}

.hashtag-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin: 12px 0;
  padding: 10px 14px;
  background: #ffffff;
  border: 1px solid #e5e7ee;
  border-radius: 8px;
}
.htag {
  background: #eef2ff;
  color: #2949d8;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
}
.htag.en { background: #f0ecff; color: #5e3ad8; }

/* Copy buttons */
.copy-btn {
  background: #f3f4f9;
  border: 1px solid #e4e6ee;
  color: #6a7090;
  padding: 3px 10px;
  font-size: 9px;
  cursor: pointer;
  font-family: inherit;
  border-radius: 4px;
  transition: all .12s;
  white-space: nowrap;
  font-weight: 600;
}
.copy-btn:hover { color: #2a2a3e; border-color: #b8bed0; }
.copy-btn.ok { color: #0d8c4c; border-color: #6fd9a3; background: #ecfdf3; }
.all-copy {
  width: 100%;
  background: #ffffff;
  border: 1px solid #e4e6ee;
  color: #4a4e68;
  padding: 10px;
  font-size: 10px;
  letter-spacing: 2px;
  cursor: pointer;
  font-family: inherit;
  border-radius: 6px;
  transition: all .15s;
  margin-top: 8px;
  font-weight: 700;
}
.all-copy:hover { border-color: #4f6af5; color: #2949d8; }

/* ===== STATUS BAR ===== */
.statusbar {
  grid-column: 1 / -1;
  background: #ffffff;
  border-top: 1px solid #e5e7ee;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 18px;
  font-size: 9px;
  color: #9097b0;
  letter-spacing: 1.5px;
  font-weight: 600;
}
.s-dot { width: 6px; height: 6px; border-radius: 50%; background: #d4d7e0; }
.s-dot.on { background: #1ec070; box-shadow: 0 0 6px #6fd9a3; }
.s-dot.err { background: #ff4466; }

/* ===== MOBILE / 携帯（縦持ち想定 〜720px） ===== */
@media (max-width: 720px) {
  html, body {
    height: auto;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    overflow-y: auto;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: auto;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
  }
  .topbar {
    flex-wrap: wrap;
    padding: 8px 12px;
    padding-top: max(8px, env(safe-area-inset-top, 0px));
    gap: 8px 10px;
    row-gap: 8px;
  }
  .logo { font-size: 11px; }
  .acc-tabs { margin-left: 0; width: 100%; justify-content: flex-start; }
  .acc-tab {
    min-height: 40px;
    padding: 8px 12px;
    font-size: 11px;
  }
  .acc-info { border-left: none; width: 100%; padding: 4px 0; }
  .day-counter, .level-badge, .trend-ind, .quote-ind, .plan-toggle, .yr-tag, .cost-tag {
    min-height: 40px;
    display: inline-flex;
    align-items: center;
  }
  .sidebar {
    width: 100%;
    max-width: 100%;
    max-height: none;
    border-right: none;
    border-bottom: 1px solid #e5e7ee;
    padding: 12px;
    padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
  }
  .main {
    min-height: 50vh;
    flex: 1;
  }
  .tabs {
    flex-wrap: wrap;
    padding: 4px;
  }
  .tab {
    min-height: 44px;
    padding: 10px 12px;
    font-size: 11px;
  }
  .preview {
    padding: 16px 14px;
    -webkit-overflow-scrolling: touch;
  }
  .gen-btn { min-height: 48px; font-size: 12px; padding: 14px; }
  .toggle-chip { min-height: 40px; padding: 8px 12px; }
  .type-btn, .pbtn { min-height: 44px; }
  .copy-btn, .all-copy { min-height: 40px; padding: 8px 12px; font-size: 10px; }
  .statusbar {
    flex-wrap: wrap;
    padding: 8px 12px;
    padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
    font-size: 8px;
    row-gap: 4px;
  }
  .cost-modal-body {
    min-width: 0;
    width: min(100vw - 24px, 480px);
    max-height: 85vh;
    overflow-y: auto;
  }
  .hero-image { max-width: 100%; }
}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">NOTE BUZZ <em>ENGINE</em></div>
    <div class="v-tag">v3.3.1</div>

    <div class="acc-tabs">
      <button class="acc-tab" data-acc="ai_main" onclick="setAccount('ai_main')">AI総合</button>
      <button class="acc-tab" data-acc="store" onclick="setAccount('store')">店舗</button>
      <button class="acc-tab" data-acc="affi_seminar" onclick="setAccount('affi_seminar')">セミナーアフィリ</button>
    </div>

    <div class="acc-info" id="accInfo">—</div>

    <div class="day-counter">
      DAY <input type="number" id="dayInp" min="1" max="365" value="1" onchange="onDayChange()">
    </div>

    <div class="level-badge lv1" id="lvBadge">LV.1 — 即金体験</div>

    <div class="trend-ind" id="trendInd" onclick="toggleTrend()" title="海外Xトレンド自動取得">🌐 トレンド</div>

    <div class="quote-ind" id="quoteInd">引用: あと<span id="quoteCnt">?</span>回</div>

    <div class="plan-toggle">
      <button class="plan-btn active-free" id="planFree" onclick="setPlan('free')">FREE</button>
      <button class="plan-btn" id="planPaid" onclick="setPlan('paid')">PAID</button>
    </div>

    <div class="yr-tag" id="yrTag">----</div>

    <div class="cost-tag" id="costTag" title="累計API使用量">¥0</div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="meta-banner" id="metaBanner"></div>

    <div>
      <div class="sec-label">メインキーワード</div>
      <input class="kw-input" id="kw" type="text" placeholder="例: AI副業 初心者 3000円" />
    </div>

    <div>
      <div class="sec-label">記事タイプ</div>
      <div class="type-grid" id="typeGrid">
        <button class="type-btn" data-val="lmn" onclick="pickType(this)">LMN最強<span class="sub">拡散×保存</span></button>
        <button class="type-btn" data-val="comparison" onclick="pickType(this)">比較・選び型<span class="sub">購買直前層</span></button>
        <button class="type-btn active" data-val="guide" onclick="pickType(this)">まとめ型<span class="sub">保存率高</span></button>
        <button class="type-btn" data-val="case_study" onclick="pickType(this)">実例型<span class="sub">信頼獲得</span></button>
        <button class="type-btn" data-val="trending" onclick="pickType(this)">トレンド型<span class="sub">時事×拡散</span></button>
      </div>
    </div>

    <div>
      <div class="sec-label" id="personaLabel">ターゲット読者</div>
      <div class="pgrid" id="pgrid"></div>
    </div>

    <div>
      <div class="sec-label">アフィリエイト軸</div>
      <select class="aff-select" id="aff"></select>
    </div>

    <div>
      <div class="sec-label">オプション</div>
      <div class="toggle-row">
        <button class="toggle-chip on" id="optImage" onclick="toggleOpt('image')">🎨 画像</button>
        <button class="toggle-chip" id="optReview" onclick="toggleOpt('review')">🔁 復習回</button>
        <button class="toggle-chip" id="optMeta" onclick="toggleOpt('meta')">📮 進行加筆</button>
      </div>
      <div id="imageSubOpts" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        <span style="font-size:8px;color:#6a7090">画:</span>
        <select class="aff-select" id="imageModeSel" style="max-width:200px" onchange="onImageSubChange()">
          <option value="dalle">DALL·E3 自動</option>
          <option value="brief">外付けAI（ﾌﾞﾘｰﾌ+英語3本）</option>
        </select>
        <select class="aff-select" id="imageSlotSel" style="max-width:200px" title="用途（DALL·Eの解像度が切り替わる）" onchange="onImageSubChange()">
          <option value="hero">汎用 / 1:1</option>
          <option value="ogp">横長 (OGP)</option>
          <option value="ig_square">Instagram 1:1</option>
          <option value="ig_story">IGストーリー 縦</option>
        </select>
      </div>
      <div class="toggle-row" style="margin-top:4px">
        <button class="toggle-chip" id="optXpost" onclick="postToX()" title="Xに自動投稿（要API設定）">✕ Xに投稿</button>
      </div>
      <div id="featStatus" style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap"></div>
    </div>

    <div id="trendTagsSec">
      <div class="sec-label" style="display:flex;justify-content:space-between;align-items:center">
        <span>🔥 直近バズタグ</span>
        <button class="copy-btn" onclick="refreshTrendTags(true)" id="refreshTagsBtn" style="padding:2px 8px;font-size:8px">更新</button>
      </div>
      <div id="trendTagsList" style="display:flex;flex-wrap:wrap;gap:3px;font-size:9px;color:#6a7090">
        <span style="color:#9097b0">取得中...</span>
      </div>
      <div id="trendTagsMeta" style="font-size:8px;color:#9097b0;margin-top:4px"></div>
    </div>

    <div id="histSec" style="display:none">
      <div class="sec-label">直近の生成</div>
      <div id="histList"></div>
    </div>

    <button class="gen-btn" id="genBtn" onclick="generate()">▶ GENERATE</button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'article')">■ 記事</button>
      <button class="tab" onclick="switchTab(this,'x')">✕ X投稿セット</button>
      <button class="tab" onclick="switchTab(this,'trend')" id="trendTab">🌐 トレンドログ</button>
      <button class="tab" onclick="switchTab(this,'history')">📚 履歴</button>
    </div>
    <div class="preview" id="preview">
      <div class="empty-state">
        <div class="empty-big">ENGINE</div>
        <div class="empty-sub">キーワードを入力して生成を実行</div>
      </div>
    </div>
  </div>

  <!-- COST MODAL -->
  <div class="cost-modal" id="costModal" onclick="if(event.target===this)closeCost()">
    <div class="cost-modal-body">
      <h3>💰 API使用量サマリー</h3>
      <div class="big" id="costBig">¥0</div>
      <table id="costTable"></table>
      <div style="margin-top:14px;display:flex;justify-content:space-between;gap:8px">
        <button class="copy-btn" onclick="refreshCosts()">再計算</button>
        <button class="copy-btn" onclick="closeCost()">閉じる</button>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="s-dot" id="sDot"></div>
    <span id="sTxt">READY</span>
    <span>■ ACC <span id="accSt">—</span></span>
    <span>■ DAY <span id="daySt">1</span></span>
    <span>■ LV <span id="lvSt">1</span></span>
    <span>■ 文字数 <span id="wcSt">0</span></span>
    <span>■ 累計生成 <span id="gcSt">0</span></span>
  </div>

</div>

<script>
// ===== CONSTANTS =====
const SK = 'nbe_v3';
const CY = new Date().getFullYear();

// ===== STATE =====
function defSt() {
  return {
    account: 'ai_main',
    plan: 'free',
    type: 'guide',
    persona: null,
    affiliate: null,
    day: 1,
    firstDate: Date.now(),
    hist: { ai_main: [], store: [], affi_seminar: [] },
    totalGens: 0,
    useTrend: false,
    useImage: true,
    imageMode: 'dalle',
    imageSlot: 'hero',
    forceReview: false,
    forceMeta: false,
    nextQuoteAt: randQ()
  };
}
function randQ() { return 3 + Math.floor(Math.random() * 4); }

let st = (() => {
  try {
    const parsed = JSON.parse(localStorage.getItem(SK));
    if (!parsed) return defSt();
    const fresh = defSt();
    return { ...fresh, ...parsed, hist: { ...fresh.hist, ...(parsed.hist || {}) } };
  } catch { return defSt(); }
})();

function saveSt() { try { localStorage.setItem(SK, JSON.stringify(st)); } catch {} }

let curTab = 'article';
let lastResult = null;
let accountDirectory = null;
let levelsFromServer = null;
let features = { image: false, imageBrief: false, xAutoPost: false, xMetrics: false, auth: false, xAccounts: {} };

// ===== BOOT =====
document.getElementById('yrTag').textContent = CY + '年';
document.getElementById('dayInp').value = st.day;
setPlan(st.plan, false);

(async function boot() {
  try {
    const [accRes, featRes, costRes] = await Promise.all([
      fetch('/api/accounts'), fetch('/api/features'), fetch('/api/costs')
    ]);
    const json = await accRes.json();
    accountDirectory = json.accounts;
    levelsFromServer = json.levels;
    features = await featRes.json();
    const costs = await costRes.json();
    document.getElementById('costTag').textContent = '¥' + (costs.total.jpy || 0).toLocaleString();
  } catch {
    accountDirectory = null;
  }
  renderFeatureStatus();
  const imSel = document.getElementById('imageModeSel');
  const isSel = document.getElementById('imageSlotSel');
  if (imSel) imSel.value = st.imageMode || 'dalle';
  if (isSel) isSel.value = st.imageSlot || 'hero';
  setAccount(st.account, false);
  refreshLevelUI();
updateQuoteInd();
updateHistList();
  checkMetaHint();
  refreshTrendTags(false);

  // Sync image option based on state
  document.getElementById('optImage').className = 'toggle-chip' + (st.useImage ? ' on' : '');
  const subOpt = document.getElementById('imageSubOpts');
  if (subOpt) { subOpt.style.opacity = st.useImage ? '1' : '0.45'; subOpt.style.pointerEvents = st.useImage ? 'auto' : 'none'; }
})();

function renderFeatureStatus() {
  const el = document.getElementById('featStatus');
  const xStore = features.xAccounts?.store;
  const fs = [
    { label: 'DALL·E', on: features.image },
    { label: 'ﾌﾞﾘｰﾌ', on: !!features.imageBrief },
    { label: 'X(店舗)', on: !!xStore },
    { label: '認証', on: features.auth }
  ];
  el.innerHTML = fs.map(f =>
    `<span class="feat-badge ${f.on ? 'feat-on' : 'feat-off'}">${f.on ? '✓' : '✕'} ${f.label}</span>`
  ).join('');
}

function syncXPostButton() {
  const xBtn = document.getElementById('optXpost');
  if (!xBtn) return;
  const acc = st.account;
  const canX = !!features.xAccounts?.[acc];
  xBtn.style.opacity = canX ? '1' : '0.55';
  xBtn.title = canX
    ? '店舗アカ @pita_pizza1 としてスレッド投稿'
    : 'X APIは店舗用キーのみ登録済み。「店舗」タブで生成した記事から投稿してください。';
}

async function refreshTrendTags(force) {
  const btn = document.getElementById('refreshTagsBtn');
  const list = document.getElementById('trendTagsList');
  const meta = document.getElementById('trendTagsMeta');
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  list.innerHTML = '<span style="color:#9097b0">取得中...</span>';
  try {
    const res = await fetch(`/api/trending-tags?account=${st.account}&force=${force ? 1 : 0}`);
    const json = await res.json();
    if (!json.tags?.length) {
      list.innerHTML = '<span style="color:#9097b0">まだタグ未取得（生成実行時に自動取得されます）</span>';
      meta.textContent = '';
    } else {
      list.innerHTML = json.tags.slice(0, 12).map(t =>
        `<span class="hist-pill" style="background:#fff1ec;border-color:#ffcd9c;color:#d44a18;cursor:pointer" title="${esc(t.reason || '')}" onclick='cpText(${JSON.stringify(t.tag)},this)'>${esc(t.tag)}</span>`
      ).join('');
      const age = json.ageMinutes;
      meta.textContent = age != null ? `取得から${age < 60 ? age + '分' : Math.floor(age/60) + '時間'}経過 / 次回自動更新まで${Math.max(0, json.ttlMinutes - age)}分` : '';
    }
  } catch (e) {
    list.innerHTML = '<span style="color:#cc3344">取得失敗</span>';
  }
  if (btn) { btn.textContent = '更新'; btn.disabled = false; }
}

// ===== ACCOUNT SWITCHING =====
function setAccount(acc, save = true) {
  st.account = acc;
  document.querySelectorAll('.acc-tab').forEach(t => {
    t.className = 'acc-tab';
    if (t.dataset.acc === acc) {
      if (acc === 'ai_main') t.classList.add('active-ai');
      if (acc === 'store') t.classList.add('active-store');
      if (acc === 'affi_seminar') t.classList.add('active-affi');
    }
  });
  document.getElementById('accSt').textContent = acc === 'ai_main' ? 'AI' : acc === 'store' ? 'STORE' : 'AFFI';

  const info = accountDirectory?.[acc];
  if (info) {
    document.getElementById('accInfo').innerHTML =
      `<b>${info.handle}</b> — ${info.label}`;
    buildPersonas(info.personaPool);
    buildAffiliates(info.affiliatePool);

    // quote/trend availability
    document.getElementById('quoteInd').className =
      'quote-ind' + (info.allowQuote ? '' : ' disabled');
    document.getElementById('trendInd').className =
      'trend-ind' + (info.allowTrend ? (st.useTrend ? ' active' : '') : ' disabled');
    if (!info.allowTrend) st.useTrend = false;
  }
  if (save) saveSt();
  if (accountDirectory) refreshTrendTags(false);
  syncXPostButton();
}

function buildPersonas(pool) {
  const grid = document.getElementById('pgrid');
  grid.innerHTML = '';
  pool.forEach((p, i) => {
    const b = document.createElement('button');
    b.className = 'pbtn' + ((st.persona === p || (!st.persona && i === 0)) ? ' active' : '');
    b.textContent = p;
    b.dataset.val = p;
    b.onclick = () => {
      grid.querySelectorAll('.pbtn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      st.persona = p;
      saveSt();
    };
    grid.appendChild(b);
  });
  if (!st.persona || !pool.includes(st.persona)) st.persona = pool[0];
}

function buildAffiliates(pool) {
  const sel = document.getElementById('aff');
  sel.innerHTML = '';
  pool.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a;
    opt.textContent = a;
    sel.appendChild(opt);
  });
  if (st.affiliate && pool.includes(st.affiliate)) sel.value = st.affiliate;
  else st.affiliate = pool[0];
  sel.onchange = () => { st.affiliate = sel.value; saveSt(); };
}

// ===== DAY / LEVEL =====
function getLevelByDay(day) {
  if (!levelsFromServer) return { lv: 1, tag: 'LV.1 — 即金体験', fromDay: 1 };
  return levelsFromServer.find(l => day >= l.fromDay && day <= l.toDay) || levelsFromServer[0];
}
function refreshLevelUI() {
  const lv = getLevelByDay(st.day);
  const el = document.getElementById('lvBadge');
  el.textContent = lv.tag;
  el.className = 'level-badge lv' + lv.lv;
  document.getElementById('lvSt').textContent = lv.lv;
  document.getElementById('daySt').textContent = st.day;
}
function onDayChange() {
  const v = Math.max(1, Math.min(365, parseInt(document.getElementById('dayInp').value) || 1));
  st.day = v;
  saveSt();
  refreshLevelUI();
  checkMetaHint();
}

async function checkMetaHint() {
  try {
    const res = await fetch('/api/meta-hint?day=' + st.day);
    const json = await res.json();
    const el = document.getElementById('metaBanner');
    if (json.hasMeta) {
      el.innerHTML = `<b>📮 今日はレベル昇格日。</b> 進行加筆メッセージが自動で挿入される準備あり（ONにすると有効）。`;
      el.classList.add('show');
      st._metaHint = json.message;
    } else {
      el.classList.remove('show');
      st._metaHint = null;
    }
  } catch {}
}

// ===== OPTIONS =====
function toggleTrend() {
  const info = accountDirectory?.[st.account];
  if (!info?.allowTrend) return;
  st.useTrend = !st.useTrend;
  document.getElementById('trendInd').className =
    'trend-ind' + (st.useTrend ? ' active' : '');
  saveSt();
}
function toggleOpt(key) {
  if (key === 'review') {
    st.forceReview = !st.forceReview;
    document.getElementById('optReview').className = 'toggle-chip' + (st.forceReview ? ' on' : '');
  }
  if (key === 'meta') {
    st.forceMeta = !st.forceMeta;
    document.getElementById('optMeta').className = 'toggle-chip' + (st.forceMeta ? ' on' : '');
  }
  if (key === 'image') {
    st.useImage = !st.useImage;
    document.getElementById('optImage').className = 'toggle-chip' + (st.useImage ? ' on' : '');
    const sub = document.getElementById('imageSubOpts');
    if (sub) { sub.style.opacity = st.useImage ? '1' : '0.45'; sub.style.pointerEvents = st.useImage ? 'auto' : 'none'; }
  }
  saveSt();
}
function onImageSubChange() {
  st.imageMode = document.getElementById('imageModeSel')?.value || 'dalle';
  st.imageSlot = document.getElementById('imageSlotSel')?.value || 'hero';
  saveSt();
}

// ===== COSTS =====
async function openCost() {
  document.getElementById('costModal').classList.add('show');
  await refreshCosts();
}
function closeCost() { document.getElementById('costModal').classList.remove('show'); }

async function refreshCosts() {
  const ctrl = new AbortController();
  const t = setTimeout(function () { ctrl.abort(); }, 20000);
  try {
    const res = await fetch('/api/costs', { signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const j = await res.json();
    document.getElementById('costBig').textContent = '¥' + (j.total.jpy || 0).toLocaleString();
    document.getElementById('costTag').textContent = '¥' + (j.total.jpy || 0).toLocaleString();
    const rows = [
      ['24時間以内', '¥' + (j.last24h.jpy || 0).toLocaleString()],
      ['30日以内', '¥' + (j.last30d.jpy || 0).toLocaleString()],
      ['累計コール数', j.total.calls + '回'],
      ['為替レート', '$1 = ¥' + j.usd_jpy]
    ];
    let tbl = rows.map(r => `<tr><td>${r[0]}</td><td class="r">${r[1]}</td></tr>`).join('');
    tbl += '<tr><td colspan="2" style="padding-top:10px;color:#6a7090;font-size:9px;letter-spacing:2px">━━ 種類別 ━━</td></tr>';
    tbl += j.byKind.map(k => `<tr><td>${k.kind} <span style="color:#9097b0">(${k.n})</span></td><td class="r">¥${(k.jpy || 0).toLocaleString()}</td></tr>`).join('');
    document.getElementById('costTable').innerHTML = tbl;
  } catch (e) {
    const msg = (e && e.name === 'AbortError')
      ? 'タイムアウト（20秒）。サーバ起動中か回線が混み合っています。しばらく待って再タップ。'
      : '取得失敗: ' + ((e && e.message) || '');
    document.getElementById('costTable').innerHTML = '<tr><td>' + msg + '</td></tr>';
  } finally {
    clearTimeout(t);
  }
}

document.getElementById('costTag').addEventListener('click', openCost);

// ===== X POST =====
async function postToX() {
  const acc = lastResult?.account || st.account;
  if (!features.xAccounts?.[acc]) {
    if (!features.xAutoPost) {
      alert('X API keys が未設定です。\nRender の Environment に X_APP_KEY など4点を設定してください。');
    } else {
      alert('登録されている X API は店舗（@pita_pizza1）用です。\n\n手順:\n1. 上部で「店舗」を選択\n2. キーワードで生成\n3. このボタンで投稿\n\nAI総合・セミナー用は別途キー発行後に対応します。');
    }
    return;
  }
  if (!lastResult?.xPosts?.length) {
    alert('先に記事を生成してください。');
    return;
  }
  if (!confirm(`${lastResult.accountHandle || '@pita_pizza1'} として${lastResult.xPosts.length}個のポストをスレッドで投稿します。実行しますか？`)) return;

  const btn = document.getElementById('optXpost');
  btn.textContent = '投稿中...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/post-to-x', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        articleId: lastResult.articleId,
        account: acc,
        posts: lastResult.xPosts,
        imageUrl: lastResult.imageUrl
      })
    });
    const j = await res.json();
    if (j.success) {
      if (confirm(`投稿成功！\n\n投稿したスレッド:\n${j.threadUrl}\n\nXで開きますか？`)) window.open(j.threadUrl, '_blank');
    } else {
      alert('投稿失敗: ' + (j.error || 'unknown'));
    }
  } catch (e) {
    alert('投稿失敗: ' + e.message);
  }
  btn.textContent = '✕ Xに投稿';
  btn.disabled = false;
}

// ===== IMAGE REGEN =====
async function regenerateImage() {
  if ((st.imageMode || 'dalle') === 'dalle' && !features.image) {
    alert('OPENAI_API_KEY が未設定です。「外付けAI（ﾌﾞﾘｰﾌ）」に切替るか、.envを設定。');
    return;
  }
  if (!lastResult?.articleId) return;
  const customPrompt = prompt('画像プロンプトを編集（空欄で自動再生成）:', lastResult.imagePrompt || '');
  if (customPrompt === null) return;

  try {
    const res = await fetch('/api/regenerate-image', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        articleId: lastResult.articleId,
        customPrompt: customPrompt || null,
        imageSlot: st.imageSlot || 'hero',
        imageMode: (st.imageMode || 'dalle') === 'brief' ? 'brief' : 'dalle'
      })
    });
    const j = await res.json();
    if (j.error) { alert('再生成: ' + j.error); return; }
    if (j.imageUrl) {
      lastResult.imageUrl = j.imageUrl;
      lastResult.imagePrompt = j.prompt;
      if (j.dalleSize) lastResult.dalleSize = j.dalleSize;
    }
    if (j.imageBrief) lastResult.imageBrief = j.imageBrief;
    if (j.imageUrl || j.imageBrief) {
      renderPreview();
      refreshCosts();
    } else {
      alert('再生成失敗: 画像なし（briefモードの場合は画面のﾌﾞﾘｰﾌ欄）');
    }
  } catch (e) {
    alert(e.message);
  }
}

// ===== HISTORY =====
async function loadHistory() {
  const el = document.getElementById('preview');
  el.innerHTML = '<div style="padding:40px;text-align:center;color:#9097b0">読込中...</div>';
  try {
    const res = await fetch(`/api/articles?account=${st.account}&limit=30`);
    const j = await res.json();
    if (!j.articles?.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-big">HISTORY</div><div class="empty-sub">このアカウントでの生成履歴なし</div></div>`;
      return;
    }
    el.innerHTML = j.articles.map(a => {
      const date = new Date(a.createdAt);
      return `<div class="x-post" style="cursor:pointer" onclick="loadArticle(${a.id})">
        <div style="display:flex;gap:12px;align-items:flex-start">
          ${a.imageUrl ? `<img src="${esc(a.imageUrl)}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;flex-shrink:0">` : ''}
          <div style="flex:1">
            <div style="font-weight:700;font-size:12px;margin-bottom:4px">${esc(a.title || '(no title)')}</div>
            <div style="font-size:10px;color:#9097b0">
              DAY ${a.day} / LV.${a.level} / ${a.plan} — ${esc(a.keyword || '')}
            </div>
            <div style="font-size:9px;color:#9097b0;margin-top:2px">
              ${date.getFullYear()}/${pad(date.getMonth()+1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<div style="padding:40px;color:#cc3344">取得失敗</div>';
  }
}

async function loadArticle(id) {
  try {
    const res = await fetch('/api/articles/' + id);
    const a = await res.json();
    lastResult = {
      articleId: a.id,
      account: a.account,
      title: a.title, article: a.article,
      xPosts: a.x_posts, hashtags: a.hashtags,
      plan: a.plan, dayNumber: a.day, level: a.level,
      levelTag: `LV.${a.level}`, seriesLabel: `DAY ${a.day} / LV.${a.level}`,
      accountHandle: accountDirectory?.[a.account]?.handle || '',
      imageUrl: a.image_url,
      reviewMode: a.meta?.reviewMode,
      trendFetched: a.meta?.trendFetched,
      affiliateLinks: [],
      trendingTags: []
    };
    // switch to article tab
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.tab').classList.add('active');
    curTab = 'article';
    renderPreview();
  } catch (e) { alert(e.message); }
}

function setPlan(p, save = true) {
  st.plan = p;
  document.getElementById('planFree').className = 'plan-btn' + (p === 'free' ? ' active-free' : '');
  document.getElementById('planPaid').className = 'plan-btn' + (p === 'paid' ? ' active-paid' : '');
  if (save) saveSt();
}

function pickType(el) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  st.type = el.dataset.val;
  saveSt();
}

function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  curTab = tab;
  if (tab === 'history') loadHistory();
  else renderPreview();
}

function setStatus(s, txt) {
  document.getElementById('sDot').className = 's-dot' + (s === 'on' ? ' on' : s === 'err' ? ' err' : '');
  document.getElementById('sTxt').textContent = txt;
}

function updateQuoteInd() {
  const info = accountDirectory?.[st.account];
  if (!info?.allowQuote) {
    document.getElementById('quoteInd').className = 'quote-ind disabled';
    return;
  }
  const rem = st.nextQuoteAt - st.totalGens;
  document.getElementById('quoteCnt').textContent = Math.max(0, rem);
  document.getElementById('quoteInd').className =
    'quote-ind' + (rem <= 0 ? ' ready' : '');
}

function updateHistList() {
  const sec = document.getElementById('histSec');
  const list = document.getElementById('histList');
  const hist = st.hist[st.account] || [];
  if (!hist.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = hist.slice(-6).reverse()
    .map(h => `<span class="hist-pill">${esc((h.title || '').slice(0, 18) + '…')}</span>`)
    .join('');
}

// ===== GENERATE =====
async function generate() {
  const kw = document.getElementById('kw').value.trim();
  if (!kw) { document.getElementById('kw').focus(); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '■ GENERATING...';
  btn.classList.add('loading');
  setStatus('on', st.useTrend ? 'TREND+GEN' : 'GENERATING');

  const info = accountDirectory?.[st.account] || {};
  const useQuote = info.allowQuote && (st.totalGens >= st.nextQuoteAt);
  const recentTitles = (st.hist[st.account] || []).slice(-5).map(h => h.title).filter(Boolean);

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        account: st.account,
        keyword: kw,
        articleType: st.type,
        persona: st.persona,
        affiliate: st.affiliate,
        plan: st.plan,
        dayNumber: st.day,
        recentTitles,
        useQuote,
        useTrend: st.useTrend,
        useImage: st.useImage,
        imageMode: st.useImage ? (st.imageMode || 'dalle') : 'dalle',
        imageSlot: st.useImage ? (st.imageSlot || 'hero') : 'hero',
        forceReview: st.forceReview,
        metaInsertion: st.forceMeta ? (st._metaHint || null) : null,
        currentYear: CY
      })
    });

    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Unknown error');

    const d = json.data;
    lastResult = d;

    st.totalGens += 1;
    if (!st.hist[st.account]) st.hist[st.account] = [];
    st.hist[st.account].push({ title: d.title, date: Date.now() });
    if (st.hist[st.account].length > 12) st.hist[st.account] = st.hist[st.account].slice(-12);
    if (useQuote) st.nextQuoteAt = st.totalGens + randQ();
    saveSt();

    const wc = (d.article || '').replace(/\s/g, '').length;
    document.getElementById('wcSt').textContent = wc.toLocaleString();
    document.getElementById('gcSt').textContent = st.totalGens;
    updateQuoteInd();
    updateHistList();
    const imTag = d.imageUrl ? ' +IMG' : ((d.imageBrief) ? ' +BRIEF' : '');
    setStatus('on', `DONE — ${d.levelTag}${d.reviewMode ? ' [REVIEW]' : ''}${d.trendFetched ? ' +TREND' : ''}${imTag}`);
    renderPreview();
    refreshCosts();
  } catch (err) {
    console.error(err);
    setStatus('err', 'ERROR: ' + err.message.slice(0, 60));
  }

  btn.disabled = false;
  btn.textContent = '▶ GENERATE';
  btn.classList.remove('loading');
}

// ===== RENDER =====
function renderPreview() {
  if (!lastResult) return;
  const el = document.getElementById('preview');

  if (curTab === 'article') {
    let html = '';

    if (lastResult.duplicateWarning) {
      const sim = Math.round(lastResult.duplicateWarning.similarity * 100);
      html += `<div class="dup-warning">⚠️ <b>類似記事検出（${sim}%）</b>：過去に「${esc(lastResult.duplicateWarning.title || '')}」という記事があります。被る場合は再生成を推奨。</div>`;
    }

    if (lastResult.imageUrl) {
      html += `<img class="hero-image" src="${esc(lastResult.imageUrl)}" alt="hero">`;
      const sz = lastResult.dalleSize ? `（${esc(lastResult.dalleSize)}）` : '';
      html += `<div class="image-actions">
        <button class="copy-btn" onclick="regenerateImage()">🎨 画像再生成</button>
        <button class="copy-btn" onclick="window.open('${esc(lastResult.imageUrl)}', '_blank')">原寸で開く</button>
        <button class="copy-btn" onclick='cpText(${JSON.stringify(lastResult.imageUrl || "")},this)'>URLコピー</button>
        <span style="font-size:9px;color:#9097b0">${sz}</span>
      </div>`;
    } else if (lastResult.imageAvailable === false && st.useImage && (st.imageMode || 'dalle') === 'dalle') {
      html += `<div class="dup-warning" style="background:#eef2ff;border-color:#4f6af5;color:#2949d8">ℹ️ OPENAI_API_KEY未設定のため DALL·E 画像をスキップ。または「外付けAI（ﾌﾞﾘｰﾌ）」モードに切替。</div>`;
    }
    if (lastResult.imageUrl && lastResult.imageBrief) {
      html += `<div style="font-size:9px;color:#6a7090;margin:4px 0">DALL·E 出力あり。下は同じ記事からの**外付け用**英語3本（Ideogram等へ）。</div>`;
    }
    if (lastResult.imageBrief) {
      const b = lastResult.imageBrief;
      const pList = (b.prompts || []).map((p, i) => `<div style="margin-top:6px"><b>${i + 1}.</b> <code style="font-size:9px;white-space:pre-wrap;word-break:break-all">${esc(p)}</code> <button type="button" class="copy-btn" onclick="cpText(${JSON.stringify(p)},this)">コピー</button></div>`).join('');
      html += `<div class="trend-card" style="margin-bottom:10px">
        <div class="trend-head">🖼 外付けAI用（Claudeﾌﾞﾘｰﾌ）</div>
        <div class="trend-body" style="font-size:11px;white-space:pre-wrap">${esc(b.brief || '')}</div>
        <div class="trend-body" style="font-size:9px;margin-top:4px">※ ${esc(b.slotNote || '')}</div>
        ${pList}
      </div>`;
    }
    if (lastResult.instagramProHint) {
      const ig = lastResult.instagramProHint;
      html += `<div class="trend-card" style="border-color:#e8b4c0;background:#fff8fa">
        <div class="trend-head">📱 Instagram Pro（手動貼付用）</div>
        <div class="trend-body" style="font-size:10px">推奨アスペクト: <b>${esc(ig.aspectRatioTarget || '')}</b></div>
        <div class="trend-body" style="font-size:9px;white-space:pre-wrap;margin-top:6px">${esc(ig.howTo || '')}</div>
        <div class="trend-body" style="font-size:10px;margin-top:8px"><b>キャプション候補（先頭X投稿流用）</b></div>
        <div class="trend-body" style="font-size:10px;white-space:pre-wrap;max-height:120px;overflow:auto">${esc(ig.suggestedCaption || '')}</div>
        <button type="button" class="copy-btn" onclick="cpText(${JSON.stringify((lastResult.instagramProHint && lastResult.instagramProHint.suggestedCaption) || '')},this)">キャプションコピー</button>
      </div>`;
    }

    if (lastResult.reviewMode) {
      html += `<div class="review-banner">🔁 復習回モード — 前レベルの内容を別角度で再提示しています</div>`;
    }
    if (lastResult.quote) {
      html += `<div class="quote-card">
        <div class="quote-who">▶ ${esc(lastResult.quote.person || '')} / ${esc(lastResult.quote.role || '')}
          <span class="quote-verify">要確認</span>
        </div>
        <div class="quote-text">"${esc(lastResult.quote.text || '')}"</div>
        <div class="quote-src">${esc(lastResult.quote.source || '')}</div>
      </div>`;
    }
    if (lastResult.trendFetched && lastResult.trendContext) {
      html += `<div class="trend-card">
        <div class="trend-head">🌐 反映した海外トレンド</div>
        <div class="trend-body">${esc(lastResult.trendContext)}</div>
      </div>`;
    }

    html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px">
      <div class="art-title">${esc(lastResult.title || '')}</div>
      <button class="copy-btn" onclick='cpText(${JSON.stringify(lastResult.article || "")},this)'>COPY</button>
    </div>`;

    html += `<div class="art-meta">
      <span>${new Date().getFullYear()}/${pad(new Date().getMonth()+1)}/${pad(new Date().getDate())}</span>
      <span class="plan-tag ${lastResult.plan}">${lastResult.plan === 'paid' ? '有料記事' : '無料記事'}</span>
      <span class="series-tag">${esc(lastResult.seriesLabel || `DAY ${lastResult.dayNumber} / ${lastResult.levelTag}`)}</span>
      <span>${(lastResult.article || '').replace(/\s/g, '').length}字</span>
      <span>${esc(lastResult.accountHandle || '')}</span>
      ${(lastResult.affiliateLinks || []).length ? `<span class="series-tag" style="background:#ecfdf3;color:#0d8c4c">🔗 ${lastResult.affiliateLinks.length}件URL埋込</span>` : ''}
    </div>`;

    if (lastResult.metaNote) {
      html += `<div class="art-meta-note">${esc(lastResult.metaNote)}</div>`;
    }

    html += '<div class="art-body">';
    (lastResult.article || '').split('\n').forEach(line => {
      if (!line.trim()) { html += '<div style="height:6px"></div>'; return; }
      if (line.match(/^#{1,3}\s/) || line.match(/^【.+】$/) || line.match(/^■/)) {
        html += `<div class="art-h2">${esc(line.replace(/^#+\s*/, ''))}</div>`;
      } else if (line.match(/^STEP\s*\d|^Step\s*\d/i)) {
        html += `<div class="art-step">${esc(line)}</div>`;
      } else if (line.match(/^[・\-\*]\s/)) {
        html += `<div class="art-li">${esc(line.replace(/^[・\-\*]\s/, ''))}</div>`;
      } else if (line.includes('【PRO TIP】') || (lastResult.plan === 'paid' && line.match(/具体的.{0,10}設定|プロンプト.*字|月.*円/))) {
        html += `<div class="art-pro-tip">${esc(line.replace('【PRO TIP】', ''))}</div>`;
      } else {
        html += `<p>${esc(line)}</p>`;
      }
    });
    html += '</div>';

    if (lastResult.hashtags?.length) {
      html += `<div class="hashtag-bar">`;
      lastResult.hashtags.forEach(h => {
        const en = /^#[A-Za-z]/.test(h);
        html += `<span class="htag ${en ? 'en' : ''}" onclick='cpText(${JSON.stringify(h)},this)'>${esc(h)}</span>`;
      });
      html += `</div>`;
    }

    el.innerHTML = html;

  } else if (curTab === 'x') {
    let html = '';
    const posts = lastResult.xPosts || [];
    const roles = posts.length === 5
      ? ['FOOK', '信頼', '手順', 'note誘導', '引用RT誘発']
      : ['訴求', '入手方法', 'レビュー誘発', '', ''];
    posts.forEach((post, i) => {
      const len = (post || '').replace(/\s/g, '').length;
      const col = len > 135 ? '#cc3344' : len > 120 ? '#b57700' : '#9097b0';
      html += `<div class="x-post">
        <div class="x-hdr">
          <span class="x-num">POST ${i + 1} / ${posts.length}<span class="x-role">${roles[i] || ''}</span></span>
          <span class="x-chars" style="color:${col}">${len} / 140</span>
          <button class="copy-btn" onclick='cpText(${JSON.stringify(post || "")},this)'>COPY</button>
        </div>
        <div class="x-text">${esc(post || '')}</div>
      </div>`;
    });
    const all = posts.join('\n\n---\n\n');
    html += `<button class="all-copy" onclick='cpText(${JSON.stringify(all)},this)'>■ スレッド全文コピー</button>`;

    if (lastResult.hashtags?.length) {
      html += `<div class="hashtag-bar">`;
      lastResult.hashtags.forEach(h => {
        const en = /^#[A-Za-z]/.test(h);
        html += `<span class="htag ${en ? 'en' : ''}" onclick='cpText(${JSON.stringify(h)},this)'>${esc(h)}</span>`;
      });
      html += `</div>`;
    }
    el.innerHTML = html;

  } else if (curTab === 'trend') {
    if (!lastResult.trendFetched) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-big">TREND</div>
        <div class="empty-sub">🌐トレンドボタンをONにして生成すると海外X情報が表示されます</div>
      </div>`;
    } else {
      el.innerHTML = `<div class="trend-card">
        <div class="trend-head">🌐 反映した海外トレンド（キャプチャ）</div>
        <div class="trend-body">${esc(lastResult.trendContext || '')}</div>
      </div>`;
    }
  }
}

function cpText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ COPIED';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 1800);
  });
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
function pad(n) { return String(n).padStart(2, '0'); }
